  <style>
  :root{
    --bg1:#0b1020;
    --bg2:#0f1a3a;
    --card:#0f1630cc;
    --card2:#101a3aee;
    --stroke:#2b3a78;
    --text:#e7ecff;
    --muted:#a9b5ff;
    --accent:#8a5cff;
    --accent2:#22e6a8;
    --warn:#ffcc66;
    --danger:#ff4d6d;
    --shadow: 0 20px 60px rgba(0,0,0,.45);
  }

  *{ box-sizing:border-box; }
  body{
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    margin:0;
    color:var(--text);
    background:
      radial-gradient(1200px 700px at 20% 10%, rgba(138,92,255,.25), transparent 60%),
      radial-gradient(900px 600px at 90% 30%, rgba(34,230,168,.18), transparent 55%),
      radial-gradient(700px 500px at 30% 85%, rgba(255,77,109,.12), transparent 55%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    min-height:100vh;
    padding:24px;
  }

  .app{
    /* max-width:1100px; */
    margin:0 auto;
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:18px 18px;
    border:1px solid rgba(43,58,120,.7);
    background: linear-gradient(180deg, rgba(16,26,58,.85), rgba(12,16,32,.75));
    border-radius:18px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    position:sticky;
    top:16px;
    z-index:10;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:260px;
  }

  .logo{
    width:44px; height:44px;
    border-radius:14px;
    background:
      radial-gradient(circle at 30% 30%, rgba(34,230,168,.95), rgba(34,230,168,.05) 55%),
      radial-gradient(circle at 70% 70%, rgba(138,92,255,.95), rgba(138,92,255,.05) 55%),
      linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0));
    border:1px solid rgba(255,255,255,.12);
    box-shadow: 0 10px 30px rgba(138,92,255,.18);
  }

  .brand h1{
    font-size:16px;
    margin:0;
    letter-spacing:.3px;
    line-height:1.1;
  }

  .brand p{
    margin:3px 0 0;
    font-size:12px;
    color:var(--muted);
  }

  #txStatus{
    flex:1;
    padding:10px 12px;
    border-radius:14px;
    background: rgba(15,22,48,.55);
    border: 1px solid rgba(43,58,120,.6);
    color: var(--muted);
    min-height: 42px;
    display:flex;
    align-items:center;
    gap:10px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
  }

  .dot{
    width:10px; height:10px;
    border-radius:999px;
    background: var(--accent2);
    box-shadow: 0 0 20px rgba(34,230,168,.7);
    flex:0 0 auto;
  }

  .actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  button,
  .action-link{
    cursor:pointer;
    border:1px solid rgba(255,255,255,.14);
    color:var(--text);
    padding:10px 12px;
    border-radius:14px;
    background: rgba(16,26,58,.65);
    transition: transform .08s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
    font-weight:600;
    letter-spacing:.2px;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
  }

  button:hover,
  .action-link:hover{
    transform: translateY(-1px);
    border-color: rgba(138,92,255,.55);
    box-shadow: 0 14px 30px rgba(0,0,0,.35);
    background: rgba(20,32,70,.70);
  }

  button:active,
  .action-link:active{
    transform: translateY(0);
    box-shadow:none;
  }

  .btn-primary{
    background: linear-gradient(135deg, rgba(138,92,255,.95), rgba(80,210,255,.65));
    border-color: rgba(138,92,255,.45);
    box-shadow: 0 12px 34px rgba(138,92,255,.25);
  }

  .btn-primary:hover{
    border-color: rgba(255,255,255,.22);
  }

  .btn-ghost{
    background: rgba(16,26,58,.35);
  }

  .btn-warn{
    background: linear-gradient(135deg, rgba(255,204,102,.95), rgba(255,77,109,.55));
    border-color: rgba(255,204,102,.45);
  }

  .grid-wrap{
    margin-top:16px;
  }

  #zombies{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap:14px;
    margin-top:12px;
  }

  .zombie-card{
    border: 1px solid rgba(43,58,120,.65);
    border-radius: 18px;
    padding: 14px;
    background: linear-gradient(180deg, rgba(15,22,48,.70), rgba(10,14,28,.55));
    box-shadow: 0 18px 50px rgba(0,0,0,.40);
    backdrop-filter: blur(10px);
    position:relative;
    overflow:hidden;
  }

  .zombie-card::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:
      radial-gradient(400px 140px at 20% 0%, rgba(138,92,255,.18), transparent 60%),
      radial-gradient(300px 120px at 90% 20%, rgba(34,230,168,.12), transparent 60%);
    pointer-events:none;
  }

  .zombie-card h3{
    margin:0 0 10px 0;
    font-size:14px;
    letter-spacing:.3px;
    color:var(--text);
    position:relative;
    z-index:1;
  }

  .zombie-card ul{
    margin:10px 0 0;
    padding-left:18px;
    color: var(--muted);
    position:relative;
    z-index:1;
  }

  .zombie-card li b{
    color: var(--text);
  }

  .zombie-actions{
    margin-top: 12px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    position:relative;
    z-index:1;
  }

  .zombie-actions button{
    padding:8px 10px;
    border-radius:12px;
    font-size:13px;
    background: rgba(16,26,58,.55);
  }

  .footer-note{
    margin-top:16px;
    color: rgba(169,181,255,.75);
    font-size:12px;
    text-align:center;
  }

  @media (max-width: 680px){
    .topbar{
      flex-direction:column;
      align-items:stretch;
    }
    .brand{ min-width:unset; }
    .actions{ justify-content:stretch; }
    button,
    .action-link{ width:100%; justify-content:center; }
  }
</style>
</head>

<body>
  <body>

          <h1>CryptoZombies</h1>

      <div class="actions">
        <button class="showZombieButton btn-ghost">Show Zombies</button>

        <button class="levelupButton btn-warn">Level Up</button>
        <a href="./fight.html" class="action-link btn-ghost">Fight Arena</a>

    </div>

  <script>

    async function startApp() {
  try {
    // 1) Load Truffle artifact (ABI + deployed address map)
    const res = await fetch("./build/contracts/ZombieOwnership.json");
    const artifact = await res.json();

    // 2) Detect current network ID (Ganache usually 5777)
    const networkId = await web3.eth.net.getId();
    const deployed = artifact.networks[networkId];

    if (!deployed || !deployed.address) {
      $("#txStatus").text(
        `ZombieOwnership not deployed on network ${networkId}. Run: truffle migrate --reset`
      );
      return;
    }

    // 3) Create contract instance from ABI + deployed address
    cryptoZombies = new web3.eth.Contract(artifact.abi, deployed.address);

    $("#txStatus").text(`Connected to ZombieOwnership: ${deployed.address}`);
      // Adding listners intialized
      if (!listenersInitialized) {
    listenersInitialized = true;
    setupEventListeners();
  } 
  } catch (err) {
    console.error(err);
    $("#txStatus").text("Failed to load contract artifact. Is http-server running at project root?");
}

  function setupEventListeners() {
  // ensure contract is ready
  if (!cryptoZombies) return;

  // NewZombie event -> refresh entire list
  cryptoZombies.events.NewZombie({ fromBlock: "latest" })
    .on("data", function (event) {
      console.log("NewZombie:", event.returnValues);
      getZombiesByOwner(userAccount).then(displayZombies);
    })
    .on("error", console.error);

  // Transfer event -> refresh only if current user was involved
  cryptoZombies.events.Transfer({ fromBlock: "latest" })
    .on("data", function (event) {
      const from = event.returnValues.from;
      const to = event.returnValues.to;
      if (
        (from && from.toLowerCase() === userAccount.toLowerCase()) ||
        (to && to.toLowerCase() === userAccount.toLowerCase())
      ) {
        getZombiesByOwner(userAccount).then(displayZombies);
      }
    })
    .on("error", console.error);
}

//Zombies Images
function getZombieImage(dna, id) {
  const n = 10; // number of images (z0.png to z9.png)
  const idx = (Number(dna) + Number(id)) % n;
  //const idx = Number(String(dna).slice(-2)) % n;
  return `images/z${idx}.png`;
}

function getDisplayZombieName(zombie, id) {
  if (!zombie?.name || zombie.name === "NoName" || zombie.name === "Spawnling") {
    return `Zombie-${(Number(zombie.readyTime) * 1000) + Number(id)}`;
  }

  return zombie.name;
}

function displayZombies(ids) {
  // bump nonce for this render run
  const myNonce = ++renderNonce;

  // clear existing cards before rendering
  $("#zombies").empty();

  // if no ids, nothing to show
  if (!ids || ids.length === 0) {
    $("#zombies").append("<div>No zombies found.</div>");
    return;
  }

  for (let id of ids) {
    getZombieDetails(id)
      .then(function (zombie) {
        // if a newer render has started, abort this append
        if (myNonce !== renderNonce) return;
        const displayName = getDisplayZombieName(zombie, id);

        $("#zombies").append(`
  <div class="zombie-card">
    <h3>Zombie #${id} — Level ${zombie.level}</h3>
    <img src="${getZombieImage(zombie.dna,id)}"
     alt="zombie"
     style="width:100%; max-width:220px; border-radius:8px; margin:8px 0;" />
    <ul>
      <li><b>Name:</b> ${displayName}</li>
      <li><b>DNA:</b> ${zombie.dna}</li>
      <li><b>Wins:</b> ${zombie.winCount}</li>
      <li><b>Losses:</b> ${zombie.lossCount}</li>
      <li><b>Ready Time:</b> ${zombie.readyTime}</li>
    </ul>

    <div class="zombie-actions">
      <button onclick="levelUp(${id})">Level Up</button>
    </div>
  </div>
`);
      })
      .catch(err => {
        console.error("Error loading zombie details for id", id, err);
      });
  }
}

    function createRandomZombie(name) {


      $("#txStatus").text("Creating new zombie on the blockchain. This may take a while...");

      return cryptoZombies.methods.createRandomZombie(name)
        .send({ from: userAccount })
        .on("receipt", function (receipt) {
          $("#txStatus").text("Successfully created " + name + "!");

          getZombiesByOwner(userAccount).then(displayZombies);
        })
        .on("error", function (error) {

          $("#txStatus").text(error);
        });
    }

    function feedOnKitty(zombieId, kittyId) {
      $("#txStatus").text("Eating a kitty. This may take a while...");
      return cryptoZombies.methods.feedOnKitty(zombieId, kittyId)
        .send({ from: userAccount })
        .on("receipt", function (receipt) {
          $("#txStatus").text("Ate a kitty and spawned a new Zombie!");
          getZombiesByOwner(userAccount).then(displayZombies);
        })
        .on("error", function (error) {
          $("#txStatus").text(error);
        });
    }

    function levelUp(zombieId) {
      $("#txStatus").text("Leveling up your zombie...");
      return cryptoZombies.methods.levelUp(zombieId)
        .send({ from: userAccount, value: web3.utils.toWei("0.001", "ether") })
        .on("receipt", function (receipt) {
          $("#txStatus").text("Power overwhelming! Zombie successfully leveled up");
          getZombiesByOwner(userAccount).then(displayZombies); // ✅ refresh
        })
        .on("error", function (error) {
          $("#txStatus").text(error);
        });
    }

    function getZombieDetails(id) {
      return cryptoZombies.methods.zombies(id).call()
    }

    function zombieToOwner(id) {
      return cryptoZombies.methods.zombieToOwner(id).call()
    }

    function getZombiesByOwner(owner) {
      return cryptoZombies.methods.getZombiesByOwner(owner).call()
    }

    window.addEventListener('load', async () => {
    // Modern dapp browsers...
    if (window.ethereum) {
        window.web3 = new Web3(ethereum);
        try {
            // Request account access if needed
            const accounts = await ethereum.enable();
            // Acccounts now exposed
            userAccount = accounts[0];
           await startApp() //adding await here for the newly added dyanmic address vode, if that code is removed remove await here.
        } catch (error) {
            // User denied account access...
            $("#txStatus").text(error.message || String(error));
        }
    }
    // Legacy dapp browsers...
    else if (window.web3) {
        window.web3 = new Web3(web3.currentProvider);
        // Acccounts always exposed
        userAccount = web3.eth.accounts[0];
        await startApp() //adding await here for the newly added dyanmic address vode, if that code is removed remove await here.
    }
    // Non-dapp browsers...
    else {
        console.log('Non-Ethereum browser detected. You should consider trying MetaMask!');
    }
   });

   //metamask no longer inject web3 since early 2021

    //  }

   if (window.ethereum) {
     ethereum.on('accountsChanged', () => {
         window.location.reload();
     });

     ethereum.on('chainChanged', () => {
         window.location.reload(); 
     });
   }

 
    createzombieButton.addEventListener('click', () => {
  const name = "Zombie-" + Date.now(); // unique name -> unique DNA
  createRandomZombie(name);
});
    showZombieButton.addEventListener('click', () => {
      getZombiesByOwner(userAccount)
            .then(displayZombies);

    });

    levelupButton.addEventListener('click', async () => {
  const ids = await getZombiesByOwner(userAccount);
  if (!ids.length) return $("#txStatus").text("No zombies to level up");
  const lastId = ids[ids.length - 1];
  levelUp(lastId).on("receipt", () => getZombiesByOwner(userAccount).then(displayZombies));
});
